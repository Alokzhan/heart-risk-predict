{% extends 'index.html' %}
{% load static %}
{% block body %}

<!-- register -->
{% if error == "create" %}
<script>
    alert('Doctor Updated Successfully');
    window.location="{% url 'view_doctor' %}";
</script>
{% endif %}

<section class="logins py-5">
    <div class="container py-xl-5 py-lg-3">

        <div class="title-section mb-md-5 mb-4">
            <h3 class="w3ls-title text-uppercase text-dark font-weight-bold">
                Update Doctor
            </h3>
        </div>
        <hr/>

        <div class="login px-sm-12" style="width:100%">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <!-- Name -->
                <div class="form-group row">
                    <div class="col-md-6">
                        <label>First Name</label>
                        <input type="text" class="form-control"
                               value="{{ doc.user.first_name|default:'' }}"
                               name="fname" required>
                    </div>

                    <div class="col-md-6">
                        <label>Last Name</label>
                        <input type="text" class="form-control"
                               value="{{ doc.user.last_name|default:'' }}"
                               name="lname" required>
                    </div>
                </div>

                <!-- Email + Contact -->
                <div class="form-group row">
                    <div class="col-md-6">
                        <label>Email</label>
                        <input type="email" class="form-control"
                               value="{{ doc.user.email|default:'' }}"
                               name="email" required>
                    </div>

                    <div class="col-md-6">
                        <label>Contact</label>
                        <input type="text" class="form-control"
                               name="contact"
                               value="{{ doc.contact|default:'' }}" required>
                    </div>
                </div>

                <!-- Category -->
                <div class="form-group row">
                    <div class="col-md-6">
                        <label>
                            Select Type of category [Current: "{{ doc.category }}"]
                        </label>

                        <select class="form-control" name="type">
                            {% for i in type %}
                                {% if i.name == doc.category %}
                                    <option value="{{ i.name }}" selected>{{ i.name }}</option>
                                {% else %}
                                    <option value="{{ i.name }}">{{ i.name }}</option>
                                {% endif %}
                            {% endfor %}
                        </select>
                    </div>

                    <!-- REMOVE duplicate contact -->
                    <div class="col-md-6">
                        <label>Contact</label>
                        <input type="text" class="form-control"
                               name="contact"
                               value="{{ doc.contact|default:'' }}" required>
                    </div>
                </div>

                <!-- Address + Image -->
                <div class="form-group row">
                    <div class="col-md-6">
                        <label>City</label>
                        <input type="text" class="form-control"
                               value="{{ doc.address|default:'' }}"
                               name="add" required>
                    </div>

                    <div class="col-md-4">
                        <label>Image</label>
                        <input type="file" class="form-control" name="image">
                    </div>

                    <div class="col-md-2">
                        {% if doc.image %}
                        <img src="{{ doc.image.url }}" style="width:70%;height:200px">
                        {% endif %}
                    </div>
                </div>

                <button type="submit" class="btn submit mt-4">
                    Update Doctor
                </button>

            </form>
        </div>
    </div>
</section>

{% endblock %}
