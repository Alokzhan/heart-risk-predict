{% extends 'index.html' %}
{% load static %}
{% block body %}

<center>
<section class="logins py-5">
    <div class="container py-xl-5 py-lg-3">

        <h3 class="text-dark font-weight-bold">Add Heart Detail</h3>
        <hr>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="close" data-dismiss="alert">&times;</button>
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="row">

                <div class="col-md-2">
                    <label>Age</label>
                    <input type="number" name="age" class="form-control" min="1" max="120" placeholder="e.g. 52" required>
                </div>

                <div class="col-md-2">
                    <label>Sex</label>
                    <select name="sex" class="form-control" required>
                        <option value="" disabled selected>Select</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label>Chest Pain Type</label>
                    <select name="cp" class="form-control" required>
                        <option value="" disabled selected>Select</option>
                        <option value="0">0 - Typical angina</option>
                        <option value="1">1 - Atypical angina</option>
                        <option value="2">2 - Non-anginal pain</option>
                        <option value="3">3 - Asymptomatic</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label>Resting BP (mmHg)</label>
                    <input type="number" name="trestbps" class="form-control" min="50" max="250" placeholder="e.g. 120" required>
                </div>

                <div class="col-md-2">
                    <label>Cholesterol (mg/dl)</label>
                    <input type="number" name="chol" class="form-control" min="100" max="600" placeholder="e.g. 240" required>
                </div>

                <div class="col-md-2">
                    <label>Fasting Blood Sugar</label>
                    <select name="fbs" class="form-control" required>
                        <option value="" disabled selected>Select</option>
                        <option value="0">0 - No (&le;120 mg/dl)</option>
                        <option value="1">1 - Yes (&gt;120 mg/dl)</option>
                    </select>
                </div>

            </div>

            <br>

            <div class="row">

                <div class="col-md-2">
                    <label>Resting ECG</label>
                    <select name="restecg" class="form-control" required>
                        <option value="" disabled selected>Select</option>
                        <option value="0">0 - Normal</option>
                        <option value="1">1 - ST-T abnormality</option>
                        <option value="2">2 - LV hypertrophy</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label>Max Heart Rate (bpm)</label>
                    <input type="number" name="thalach" class="form-control" min="60" max="220" placeholder="e.g. 150" required>
                </div>

                <div class="col-md-2">
                    <label>Exercise Induced Angina</label>
                    <select name="exang" class="form-control" required>
                        <option value="" disabled selected>Select</option>
                        <option value="0">0 - No</option>
                        <option value="1">1 - Yes</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label>Oldpeak (ST depression)</label>
                    <input type="number" name="oldpeak" class="form-control" min="0" max="10" step="0.1" placeholder="e.g. 1.5" required>
                </div>

                <div class="col-md-2">
                    <label>Slope</label>
                    <select name="slope" class="form-control" required>
                        <option value="" disabled selected>Select</option>
                        <option value="0">0 - Upsloping</option>
                        <option value="1">1 - Flat</option>
                        <option value="2">2 - Downsloping</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label>CA (major vessels)</label>
                    <select name="ca" class="form-control" required>
                        <option value="" disabled selected>Select</option>
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </div>

            </div>

            <br>

            <div class="row">
                <div class="col-md-2">
                    <label>Thal</label>
                    <select name="thal" class="form-control" required>
                        <option value="" disabled selected>Select</option>
                        <option value="1">1 - Normal</option>
                        <option value="2">2 - Fixed defect</option>
                        <option value="3">3 - Reversible defect</option>
                    </select>
                </div>
            </div>

            <br>

            <button type="submit" class="btn btn-dark">
                Predict Heart Disease
            </button>

        </form>

    </div>
</section>
</center>

{% endblock %}
